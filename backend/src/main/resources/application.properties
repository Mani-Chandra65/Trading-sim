spring.application.name=demo-project

# Load key=value pairs from backend/.env when present.
spring.config.import=optional:file:.env[.properties]

# MySQL connection (.env / environment driven)
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Auth session token settings
app.auth.token-ttl-hours=${AUTH_TOKEN_TTL_HOURS:12}
app.auth.rolling-refresh-minutes=${AUTH_ROLLING_REFRESH_MINUTES:30}

# Market data source
# MARKET_PROVIDER can be: binance | simulated
app.market.provider=${MARKET_PROVIDER:binance}
app.market.binance.base-url=${BINANCE_BASE_URL:https://api.binance.com}
app.market.request-timeout-ms=${MARKET_REQUEST_TIMEOUT_MS:5000}
